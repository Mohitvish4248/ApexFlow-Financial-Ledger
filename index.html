        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f5; }
        .container { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { max-width: 200px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        .view-toggle { display: flex; justify-content: center; margin: 20px 0; gap: 20px; }
        .view-toggle button { padding: 10px 20px; border: none; font-size: 1.1em; color: #fff; background-color: #21cc72; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; }
        .view-toggle button:hover { background-color: #1aa65e; }
        .kpi-container { display: flex; justify-content: space-around; flex-wrap: wrap; margin-bottom: 20px; }
        .kpi-box { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.11); text-align: center; width: 22%; min-width: 150px; margin: 10px; color: #333; }
        .kpi-box h3 { margin: 0 0 10px 0; color: #555; }
        .kpi-box p { font-size: 2em; font-weight: bold; color: #21cc72; margin: 0; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.11); }
        .table-container { overflow-x: auto; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.11); margin-top: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 0; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .hide { display: none; }
    </style>

        let summaryData = {};
        const currencyFormatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 });

        document.addEventListener('DOMContentLoaded', () => {
            const boardView = document.getElementById('board-view');
            const restrictedView = document.getElementById('restricted-view');
            const staticBudgetView = document.getElementById('static-budget-view');

            const boardBtn = document.getElementById('board-btn');
            const restrictedBtn = document.getElementById('restricted-btn');
            const staticBudgetBtn = document.getElementById('static-budget-btn');

            const processData = () => {
                const totals = { totalBudget: 0, totalSpent: 0, totalRestrictedBudget: 0, totalUnrestrictedBudget: 0, totalRestrictedSpent: 0, totalUnrestrictedSpent: 0 };
                const spendingByCategory = {};
                CLEANED_DATA.forEach(item => {
                    totals.totalBudget += item.Budget;
                    totals.totalSpent += item.YTD_Actual;
                    if (item.Fund_Restriction === 'Restricted') { totals.totalRestrictedBudget += item.Budget; totals.totalRestrictedSpent += item.YTD_Actual; }
                    else { totals.totalUnrestrictedBudget += item.Budget; totals.totalUnrestrictedSpent += item.YTD_Actual; }
                    const category = item.Category || 'Other';
                    if (!spendingByCategory[category]) spendingByCategory[category] = { Restricted: 0, Unrestricted: 0 };
                    if (item.Fund_Restriction === 'Restricted') spendingByCategory[category].Restricted += item.YTD_Actual;
                    else spendingByCategory[category].Unrestricted += item.YTD_Actual;
                });
                totals.restrictedEndingBalance = totals.totalRestrictedBudget - totals.totalRestrictedSpent;
                totals.unrestrictedEndingBalance = totals.totalUnrestrictedBudget - totals.totalUnrestrictedSpent;
                summaryData = { totals, spendingByCategory };
            };

            const renderBoardView = () => {
                const { totals } = summaryData;
                document.getElementById('kpi-container').innerHTML = `
                    <div class="kpi-box"><p>${currencyFormatter.format(totals.totalBudget)}</p><h3>Total Budget</h3></div>
                    <div class="kpi-box"><p>${currencyFormatter.format(totals.totalSpent)}</p><h3>Total Spent</h3></div>
                    <div class="kpi-box"><p>${currencyFormatter.format(totals.totalUnrestrictedBudget)}</p><h3>Op Budget</h3></div>
                    <div class="kpi-box"><p>${currencyFormatter.format(totals.unrestrictedEndingBalance)}</p><h3>Net Balance</h3></div>
                `;
                Plotly.newPlot('board-view-pie', [{ labels: ['Restricted', 'Unrestricted'], values: [totals.totalRestrictedSpent, totals.totalUnrestrictedSpent], type: 'pie', marker: { colors: ['#ffc107', '#21cc72'] } }], { title: 'Expenditure Distribution' });
                const categories = Object.keys(summaryData.spendingByCategory);
                Plotly.newPlot('board-view-bar', [{ x: categories, y: categories.map(cat => summaryData.spendingByCategory[cat].Restricted), name: 'Restricted', type: 'bar', marker: { color: '#ffc107' } }, { x: categories, y: categories.map(cat => summaryData.spendingByCategory[cat].Unrestricted), name: 'Unrestricted', type: 'bar', marker: { color: '#21cc72' } }], { barmode: 'stack', title: 'Spending by Category' });
            };

            const renderRestrictedView = () => {
                let html = `<table><thead><tr><th>Category</th><th>Details</th><th>Budget</th><th>Spent</th><th>Balance</th></tr></thead><tbody>`;
                CLEANED_DATA.filter(i => i.Fund_Restriction === 'Restricted').forEach(i => {
                    html += `<tr><td>${i.Category}</td><td>${i.Subcategory}</td><td>${currencyFormatter.format(i.Budget)}</td><td>${currencyFormatter.format(i.YTD_Actual)}</td><td>${currencyFormatter.format(i.Ending_Balance)}</td></tr>`;
                });
                document.getElementById('restricted-table-content').innerHTML = html + `</tbody></table>`;
            };

            const renderStaticBudgetView = () => {
                let html = `<table><thead><tr><th>Category</th><th>Item</th><th>Budget</th><th>Spent</th></tr></thead><tbody>`;
                CLEANED_DATA.forEach(i => {
                    html += `<tr><td>${i.Category}</td><td>${i.Subcategory}</td><td>${currencyFormatter.format(i.Budget)}</td><td>${currencyFormatter.format(i.YTD_Actual)}</td></tr>`;
                });
                document.getElementById('static-budget-table').innerHTML = html + `</tbody></table>`;
            };

            boardBtn.addEventListener('click', () => { boardView.classList.remove('hide'); restrictedView.classList.add('hide'); staticBudgetView.classList.add('hide'); renderBoardView(); });
            restrictedBtn.addEventListener('click', () => { boardView.classList.add('hide'); restrictedView.classList.remove('hide'); staticBudgetView.classList.add('hide'); renderRestrictedView(); });
            staticBudgetBtn.addEventListener('click', () => { boardView.classList.add('hide'); restrictedView.classList.add('hide'); staticBudgetView.classList.remove('hide'); renderStaticBudgetView(); });

            processData();
            renderBoardView();
        });
    </script>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="logo.png" alt="ApexFlow Logo">
        <h1>ApexFlow Financial Ledger</h1>
        <p>Global Solutions Portfolio | Client: Nova Sterling</p>
    </div>
    <div class="view-toggle">
        <button id="board-btn">Executive View</button>
        <button id="restricted-btn">Restricted Ledger</button>
        <button id="static-budget-btn">Master Overview</button>
    </div>
    <div id="board-view">
        <div class="kpi-container" id="kpi-container"></div>
        <div class="dashboard-grid">
            <div class="chart-container"><div id="board-view-pie"></div></div>
            <div class="chart-container"><div id="board-view-bar"></div></div>
        </div>
    </div>
    <div id="restricted-view" class="hide">
        <div class="table-container"><h2>Restricted Item Details</h2><div id="restricted-table-content"></div></div>
    </div>
    <div id="static-budget-view" class="hide">
        <div class="table-container"><h2>Budget Master List</h2><div id="static-budget-table"></div></div>
    </div>
</div>
</body>
</html>
